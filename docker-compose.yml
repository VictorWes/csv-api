version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdv-db
    environment:
      POSTGRES_DB: pdv_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5430:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
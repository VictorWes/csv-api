# Deixamos o Flyway rodar normalmente para criar as tabelas dentro do banco do Docker!
spring.flyway.enabled=true

# O Hibernate só valida, o Flyway é quem manda na estrutura
spring.jpa.hibernate.ddl-auto=validate

# Chave secreta falsa apenas para os testes passarem na segurança do JWT
api.security.token.secret=test-secret-key-com-exatos-32-chars-!!